name: AI PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for broken internal links
        run: |
          echo "Scanning changed .md files for broken links..."
          ERRORS=0
          for file in $(git diff --name-only origin/main...HEAD -- '*.md'); do
            grep -oP '\[.*?\]\(((?!http)[^)]+)\)' "$file" 2>/dev/null | while read -r match; do
              link=$(echo "$match" | grep -oP '\(([^)]+)\)' | tr -d '()')
              target=$(dirname "$file")/"$link"
              if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                echo "::error file=$file::Broken link: $link"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS broken links"
            exit 1
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          review_prompt: |
            Review this PR against 8 quality checks:
            1. ACCURACY — No fake URLs, wrong version numbers, or incorrect Cursor feature descriptions
            2. STYLE CONSISTENCY — All examples are copy-paste-ready, formatting matches existing guides
            3. CROSS-REFERENCES — Links between guides/resources use correct paths and numbers
            4. NO REGRESSIONS — No content removed without replacement, no contradictions introduced
            5. GAPS TRACKING — research/gaps.md updated if gaps were resolved or discovered
            6. MARKDOWN VALIDITY — Valid markdown, code blocks have language tags
            7. NO BROKEN LINKS — Internal links point to existing files
            8. NO DUPLICATES — No verbatim content repeated across guides or resources

            For each check: PASS or FAIL with specific line references.
            Approve only if ALL 8 checks pass.
